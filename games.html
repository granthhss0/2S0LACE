<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Games — 2S0LACE</title>
<meta name="description" content="Browse and play the full 2S0LACE HTML5 games catalog." />
<link rel="stylesheet" href="assets/css/tokens.css" />
<link rel="stylesheet" href="assets/css/nav.css" />
<link rel="stylesheet" href="assets/css/games.css" />
</head>
<body data-page="games">

<div id="nav-mount"></div>

<div class="page">
  <div class="content">
    <div class="container">

      <div id="browse-view">
        <div class="games-header">
          <div>
            <span class="eyebrow">catalog</span>
            <h1 class="games-title">All games</h1>
          </div>
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="game-search" placeholder="Search games or tags…" autocomplete="off" />
          </div>
        </div>

        <div class="game-grid" id="game-grid">
          <div class="empty-state">loading catalog…</div>
        </div>
      </div>

      <div class="player-view" id="player-view">
        <div class="player-bar">
          <div class="player-meta">
            <button class="btn btn-glass" id="close-player">← Back to catalog</button>
            <h2 id="player-title">Game title</h2>
          </div>
        </div>

        <div class="player-frame-wrap glass">
          <iframe id="player-frame" src="" title="Game player" allow="fullscreen; gamepad; autoplay" allowfullscreen></iframe>
        </div>

        <div class="player-details">
          <div class="detail-card glass">
            <h4>About</h4>
            <p id="player-desc">—</p>
          </div>
          <div class="detail-card glass">
            <h4>Controls</h4>
            <p id="player-controls">—</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/games.js"></script>
</body>
</html>
