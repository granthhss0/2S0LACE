<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sample Game — 2S0LACE</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #0a0a0b;
    display: flex; align-items: center; justify-content: center;
    font-family: system-ui, sans-serif;
  }
  canvas { background: #111113; border-radius: 16px; touch-action: none; }
  #hud {
    position: fixed; top: 16px; left: 16px; color: #f5f5f7;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    background: rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.14);
  }
</style>
</head>
<body>
<div id="hud">score: <span id="score">0</span></div>
<canvas id="game" width="480" height="640"></canvas>
<script>
  // Minimal "dodge the blocks" game — placeholder demonstrating the /games/<id>/ pattern.
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');

  let player = { x: 220, y: 560, w: 40, h: 40, speed: 6 };
  let keys = {};
  let obstacles = [];
  let frame = 0;
  let score = 0;
  let gameOver = false;

  document.addEventListener('keydown', e => keys[e.key] = true);
  document.addEventListener('keyup', e => keys[e.key] = false);

  canvas.addEventListener('touchmove', e => {
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    player.x = Math.min(Math.max(x - player.w / 2, 0), canvas.width - player.w);
    e.preventDefault();
  }, { passive: false });

  function spawnObstacle() {
    const w = 30 + Math.random() * 50;
    obstacles.push({ x: Math.random() * (canvas.width - w), y: -30, w, h: 26, speed: 3 + Math.random() * 3 });
  }

  function update() {
    if (gameOver) return;
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
    player.x = Math.min(Math.max(player.x, 0), canvas.width - player.w);

    frame++;
    if (frame % 40 === 0) spawnObstacle();

    obstacles.forEach(o => o.y += o.speed);
    obstacles = obstacles.filter(o => o.y < canvas.height + 40);

    obstacles.forEach(o => {
      if (player.x < o.x + o.w && player.x + player.w > o.x &&
          player.y < o.y + o.h && player.y + player.h > o.y) {
        gameOver = true;
      }
    });

    score++;
    scoreEl.textContent = score;
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#f5f5f7';
    ctx.beginPath();
    ctx.roundRect(player.x, player.y, player.w, player.h, 10);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    obstacles.forEach(o => {
      ctx.beginPath();
      ctx.roundRect(o.x, o.y, o.w, o.h, 6);
      ctx.fill();
    });

    if (gameOver) {
      ctx.fillStyle = 'rgba(10,10,11,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#f5f5f7';
      ctx.font = '600 24px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('game over', canvas.width / 2, canvas.height / 2 - 10);
      ctx.font = '14px monospace';
      ctx.fillText('refresh to retry · score ' + score, canvas.width / 2, canvas.height / 2 + 20);
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
